[project]
site_name = "Audio XAI Fragility"
site_url = "https://cncPomper.github.io/Audio-XAI-Fragility/"
repo_url = "https://github.com/cncPomper/Audio-XAI-Fragility"
repo_name = "cncPomper/Audio-XAI-Fragility"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
